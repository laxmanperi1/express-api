# Optional: only needed for private GitHub repos.
# Public repos can be pulled without credentials.
apiVersion: v1
kind: Secret
metadata:
  name: express-api-github
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/laxmanperi1/express-api.git
  # Uncomment for private repos:
  # password: <github-personal-access-token>
  # username: laxmanperi1
