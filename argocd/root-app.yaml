apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: express-api-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: express-api-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/laxmanperi1/express-api.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
