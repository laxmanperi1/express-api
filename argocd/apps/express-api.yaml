apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: express-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: express-api
  source:
    repoURL: __GIT_REPO_URL__
    targetRevision: main
    path: deploy/overlays/minikube
  destination:
    server: https://kubernetes.default.svc
    namespace: express-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
