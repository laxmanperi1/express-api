apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-api
spec:
  template:
    spec:
      containers:
        - name: express-api
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: debug
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
