apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: express-api
    newName: express-api
    newTag: "1.0.0"

patches:
  - target:
      kind: Deployment
      name: express-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
