apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: express-api
    newName: REPLACE_ECR_REGISTRY/express-api
    newTag: "1.0.0"

patches:
  - target:
      kind: Ingress
      name: express-api
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.example.com
