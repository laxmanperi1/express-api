apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-api
spec:
  template:
    spec:
      containers:
        - name: express-api
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
