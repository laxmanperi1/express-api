apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: express-api
  namespace: express-api
  labels:
    app: express-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - express-api.local
      secretName: express-api-tls
  rules:
    - host: express-api.local
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: express-api
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: express-api
                port:
                  number: 80
