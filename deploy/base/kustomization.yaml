apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: express-api

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - pdb.yaml
  - networkpolicy.yaml

labels:
  - pairs:
      app.kubernetes.io/name: express-api
      app.kubernetes.io/part-of: express-api
    includeSelectors: true
  - pairs:
      app.kubernetes.io/version: "1.0.0"
    includeSelectors: false

commonAnnotations:
  argocd.argoproj.io/sync-wave: "2"
